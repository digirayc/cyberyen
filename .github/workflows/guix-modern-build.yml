# Modern parallel Guix test — does not affect release process or Gitian.
#
# This workflow exercises ./contrib/guix/guix-build (manifest-modern.scm, prelude.bash)
# on branch guix-migration-stage1 only. It does not modify Gitian descriptors, legacy
# guix-build.sh, or the v0.21.6 release process. Artifacts are for reproducibility
# experiments and CI validation only.

name: Guix modern (parallel smoke)

on:
  push:
    branches:
      - guix-migration-stage1
  pull_request:
    branches:
      - guix-migration-stage1

concurrency:
  group: guix-modern-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guix-build-linux-x86_64:
    name: Modern Guix build (x86_64-linux-gnu)
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      # Same pin as contrib/guix/guix-build.sh / prelude.bash defaults.
      GUIX_GIT_URL: https://github.com/dongcarl/guix.git
      GUIX_GIT_COMMIT: b066c25026f21fb57677aa34692a5034338e7ee3
      # Single-host matrix equivalent: fastest useful smoke for CI.
      HOSTS: x86_64-linux-gnu
      # Keep logs readable on shared runners.
      JOBS: 4
      # Reliable public substitutes for time-machine / shell (avoids depending on SWH for substitutes).
      GUIX_SUBSTITUTE_URLS: "https://ci.guix.gnu.org https://bordeaux.guix.gnu.org"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Best-practice Guix install for Ubuntu runners (daemon, store, substitutes).
      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Show Guix version
        run: guix --version

      # Authorize official substitute signing keys (ci + Bordeaux) for the daemon.
      - name: Guix substitute setup
        run: |
          set -euo pipefail
          GUIX_ROOT="/var/guix/profiles/per-user/root/current-guix"
          GUIX_BIN="${GUIX_ROOT}/bin/guix"
          for key in \
            "${GUIX_ROOT}/share/guix/ci.guix.gnu.org.pub" \
            "${GUIX_ROOT}/share/guix/bordeaux.guix.gnu.org.pub"; do
            if [ -f "${key}" ]; then
              sudo "${GUIX_BIN}" archive --authorize < "${key}"
            fi
          done

      - name: Run modern Guix driver (full release-style build)
        # Modern parallel Guix test — does not affect release process or Gitian.
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          max_attempts=3
          attempt=1
          while [ "${attempt}" -le "${max_attempts}" ]; do
            if ./contrib/guix/guix-build; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "guix-build failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "Transient failure (attempt ${attempt}/${max_attempts}); retrying in 60s..."
            sleep 60
            attempt=$((attempt + 1))
          done

      - name: Compute SHA256 of versioned output tree
        id: hashes
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          # shellcheck disable=SC1091
          source contrib/gitian-descriptors/assign_DISTNAME
          OUT_ROOT="guix-build-${VERSION}/output"
          if [ ! -d "${OUT_ROOT}" ]; then
            echo "Expected output directory missing: ${OUT_ROOT}"
            ls -la "guix-build-${VERSION}" || true
            exit 1
          fi
          find "${OUT_ROOT}" -type f -print0 | sort -z | xargs -0 sha256sum | tee SHA256SUMS-guix-modern.txt
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "out_root=${OUT_ROOT}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifacts (output tree)
        uses: actions/upload-artifact@v4
        with:
          name: guix-modern-output-${{ steps.hashes.outputs.version }}
          path: |
            guix-build-${{ steps.hashes.outputs.version }}/output/
            SHA256SUMS-guix-modern.txt
          if-no-files-found: error
