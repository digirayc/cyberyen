# Modern Guix CI — dongcarl pin only. Does not affect Gitian or release process.
#
# Smoke build on guix-migration-stage1: GitHub Actions cache of ~/.cache/guix (Guix
# time-machine checkouts, keyed by GUIX_GIT_COMMIT) + substitutes + retries mitigate
# transient network/DNS faults (including SWH-related source fetches).

name: Guix modern (parallel smoke)

on:
  push:
    branches:
      - guix-migration-stage1
  pull_request:
    branches:
      - guix-migration-stage1

concurrency:
  group: guix-modern-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guix-build-linux-x86_64:
    name: Modern Guix build (x86_64-linux-gnu)
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      GUIX_GIT_URL: https://github.com/dongcarl/guix.git
      GUIX_GIT_COMMIT: b066c25026f21fb57677aa34692a5034338e7ee3
      GUIX_SUBSTITUTE_URLS: "https://ci.guix.gnu.org https://bordeaux.guix.gnu.org"
      HOSTS: x86_64-linux-gnu
      JOBS: 4
      ADDITIONAL_GUIX_TIMEMACHINE_FLAGS: "--fallback"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Network readiness (multi-attempt)
        run: |
          set -euo pipefail
          sleep 20
          if ! ping -c 3 -W 5 8.8.8.8; then
            echo "::warning::ICMP ping to 8.8.8.8 failed (often blocked on hosted runners); continuing."
          fi
          net_max=5
          net_a=1
          while [ "${net_a}" -le "${net_max}" ]; do
            echo "Network attempt ${net_a}/${net_max}: checking ci.guix.gnu.org and bordeaux.guix.gnu.org"
            if curl -fsS --max-time 90 "https://ci.guix.gnu.org/" -o /dev/null && \
               curl -fsS --max-time 90 "https://bordeaux.guix.gnu.org/" -o /dev/null; then
              echo "--- ci.guix.gnu.org (headers) ---"
              curl -fsSI --max-time 60 "https://ci.guix.gnu.org/" | head -20 || true
              echo "--- bordeaux.guix.gnu.org (headers) ---"
              curl -fsSI --max-time 60 "https://bordeaux.guix.gnu.org/" | head -20 || true
              echo "Network readiness OK"
              exit 0
            fi
            if [ "${net_a}" -eq "${net_max}" ]; then
              echo "ERR: Could not reach one or both substitute front-ends after ${net_max} attempts"
              exit 1
            fi
            echo "Retrying network check in 45s..."
            sleep 45
            net_a=$((net_a + 1))
          done

      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Show Guix version
        run: guix --version

      - name: Authorize official substitute signing keys (ci.guix.gnu.org + bordeaux)
        run: |
          set -euo pipefail
          GUIX_ROOT="/var/guix/profiles/per-user/root/current-guix"
          GUIX_BIN="${GUIX_ROOT}/bin/guix"
          for key in \
            "${GUIX_ROOT}/share/guix/ci.guix.gnu.org.pub" \
            "${GUIX_ROOT}/share/guix/bordeaux.guix.gnu.org.pub"; do
            if [ ! -f "${key}" ]; then
              echo "ERR: Missing signing key file: ${key}"
              exit 1
            fi
            sudo "${GUIX_BIN}" archive --authorize < "${key}"
          done

      # Guix stores time-machine channel clones under ~/.cache/guix (see XDG_CACHE_HOME).
      # Restoring this before preflight/guix-build avoids re-cloning dongcarl/guix when possible.
      - name: Cache Guix time-machine checkout (~/.cache/guix)
        uses: actions/cache@v4
        id: guix-cache
        with:
          path: ~/.cache/guix
          key: guix-time-machine-${{ runner.os }}-${{ env.GUIX_GIT_COMMIT }}
          restore-keys: |
            guix-time-machine-${{ runner.os }}-

      - name: Preflight guix time-machine + shell (5 attempts, manifest + substitutes, uses cache)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          export HOST=x86_64-linux-gnu
          export XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}"
          echo "Guix checkout cache: hit=${{ steps.guix-cache.outputs.cache-hit }}"
          ls -la "${XDG_CACHE_HOME}/guix" 2>/dev/null || echo "(cache dir empty or missing until first clone)"
          pre_max=5
          pre_a=1
          while [ "${pre_a}" -le "${pre_max}" ]; do
            echo "Preflight attempt ${pre_a}/${pre_max}"
            if guix time-machine \
              --url="${GUIX_GIT_URL}" \
              --commit="${GUIX_GIT_COMMIT}" \
              --substitute-urls="${GUIX_SUBSTITUTE_URLS}" \
              --fallback \
              -- shell \
              --manifest="${GITHUB_WORKSPACE}/contrib/guix/manifest.scm" \
              --pure \
              --fallback \
              --substitute-urls="${GUIX_SUBSTITUTE_URLS}" \
              -- true; then
              echo "Preflight succeeded"
              exit 0
            fi
            if [ "${pre_a}" -eq "${pre_max}" ]; then
              echo "ERR: Preflight failed after ${pre_max} attempts"
              exit 1
            fi
            echo "Preflight failed; waiting 90s before retry..."
            sleep 90
            pre_a=$((pre_a + 1))
          done

      - name: Run Guix driver (full smoke build, 12×150s retries)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          max_attempts=12
          attempt=1
          while [ "${attempt}" -le "${max_attempts}" ]; do
            if ./contrib/guix/guix-build; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "guix-build failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "Transient failure (attempt ${attempt}/${max_attempts}); retrying in 150s..."
            sleep 150
            attempt=$((attempt + 1))
          done

      - name: Compute SHA256 of versioned output tree
        id: hashes
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          # shellcheck disable=SC1091
          source contrib/gitian-descriptors/assign_DISTNAME
          OUT_ROOT="guix-build-${VERSION}/output"
          if [ ! -d "${OUT_ROOT}" ]; then
            echo "Expected output directory missing: ${OUT_ROOT}"
            ls -la "guix-build-${VERSION}" || true
            exit 1
          fi
          find "${OUT_ROOT}" -type f -print0 | sort -z | xargs -0 sha256sum | tee SHA256SUMS-guix-modern.txt
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "out_root=${OUT_ROOT}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifacts (output tree)
        uses: actions/upload-artifact@v4
        with:
          name: guix-modern-output-${{ steps.hashes.outputs.version }}
          path: |
            guix-build-${{ steps.hashes.outputs.version }}/output/
            SHA256SUMS-guix-modern.txt
          if-no-files-found: error
