# Modern Guix CI — dongcarl pin only. Does not affect Gitian or release process.
#
# Smoke build on branch guix-migration-stage1: substitutes + retries mitigate transient
# network/DNS issues (including occasional Software Heritage resolution failures when
# Guix falls back to building from source).

name: Guix modern (parallel smoke)

on:
  push:
    branches:
      - guix-migration-stage1
  pull_request:
    branches:
      - guix-migration-stage1

concurrency:
  group: guix-modern-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guix-build-linux-x86_64:
    name: Modern Guix build (x86_64-linux-gnu)
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      GUIX_GIT_URL: https://github.com/dongcarl/guix.git
      GUIX_GIT_COMMIT: b066c25026f21fb57677aa34692a5034338e7ee3
      GUIX_SUBSTITUTE_URLS: "https://ci.guix.gnu.org https://bordeaux.guix.gnu.org"
      HOSTS: x86_64-linux-gnu
      JOBS: 4
      # Propagate through contrib/guix/libexec/prelude.bash time_machine().
      ADDITIONAL_GUIX_TIMEMACHINE_FLAGS: "--fallback"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Network readiness
        run: |
          set -euo pipefail
          sleep 15
          # ICMP may be filtered on some runners; warn but do not fail the job.
          if ! ping -c 3 -W 5 8.8.8.8; then
            echo "::warning::ICMP ping to 8.8.8.8 failed (often blocked on hosted runners); continuing."
          fi
          curl -fsSI --max-time 60 https://ci.guix.gnu.org/ | head -20

      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Show Guix version
        run: guix --version

      - name: Authorize official substitute signing keys (ci.guix.gnu.org + bordeaux)
        run: |
          set -euo pipefail
          GUIX_ROOT="/var/guix/profiles/per-user/root/current-guix"
          GUIX_BIN="${GUIX_ROOT}/bin/guix"
          for key in \
            "${GUIX_ROOT}/share/guix/ci.guix.gnu.org.pub" \
            "${GUIX_ROOT}/share/guix/bordeaux.guix.gnu.org.pub"; do
            if [ ! -f "${key}" ]; then
              echo "ERR: Missing signing key file: ${key}"
              exit 1
            fi
            sudo "${GUIX_BIN}" archive --authorize < "${key}"
          done

      - name: Preflight guix time-machine + shell (manifest, substitutes, fallback)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          export HOST=x86_64-linux-gnu
          guix time-machine \
            --url="${GUIX_GIT_URL}" \
            --commit="${GUIX_GIT_COMMIT}" \
            --substitute-urls="${GUIX_SUBSTITUTE_URLS}" \
            --fallback \
            -- shell \
            --manifest="${GITHUB_WORKSPACE}/contrib/guix/manifest.scm" \
            --pure \
            --fallback \
            --substitute-urls="${GUIX_SUBSTITUTE_URLS}" \
            -- true

      - name: Run Guix driver (full smoke build, with retries)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          max_attempts=8
          attempt=1
          while [ "${attempt}" -le "${max_attempts}" ]; do
            if ./contrib/guix/guix-build; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "guix-build failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "Transient failure (attempt ${attempt}/${max_attempts}); retrying in 120s..."
            sleep 120
            attempt=$((attempt + 1))
          done

      - name: Compute SHA256 of versioned output tree
        id: hashes
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          # shellcheck disable=SC1091
          source contrib/gitian-descriptors/assign_DISTNAME
          OUT_ROOT="guix-build-${VERSION}/output"
          if [ ! -d "${OUT_ROOT}" ]; then
            echo "Expected output directory missing: ${OUT_ROOT}"
            ls -la "guix-build-${VERSION}" || true
            exit 1
          fi
          find "${OUT_ROOT}" -type f -print0 | sort -z | xargs -0 sha256sum | tee SHA256SUMS-guix-modern.txt
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "out_root=${OUT_ROOT}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifacts (output tree)
        uses: actions/upload-artifact@v4
        with:
          name: guix-modern-output-${{ steps.hashes.outputs.version }}
          path: |
            guix-build-${{ steps.hashes.outputs.version }}/output/
            SHA256SUMS-guix-modern.txt
          if-no-files-found: error
