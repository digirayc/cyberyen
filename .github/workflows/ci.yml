name: Guix CI

on:
  push:
    branches: [ feature/guix-build-system ]
  pull_request:
    branches: [ feature/guix-build-system ]

jobs:
  guix-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Build Cyberyen with Guix (Linux)
        run: |
          guix shell --pure -m contrib/guix/manifest.scm -- bash -c '
            set -e
            echo "=== Starting Guix build for Cyberyen ==="
            echo "Host: x86_64-unknown-linux-gnu"
            ./contrib/guix/guix-build.sh
          '
        env:
          HOST: x86_64-unknown-linux-gnu
